<div class="list-item" (click)="itemClick.emit()" role="button" tabindex="0"
  (keydown.enter)="itemClick.emit()" (keydown.space)="itemClick.emit()">
  <div class="list-item__content">
    <span class="list-item__title">{{ title() }}</span>
    <span class="list-item__subtitle">{{ subtitle() }}</span>
  </div>
  <lucide-icon name="chevron-right" [size]="20" class="list-item__chevron" />
</div>
