<div class="screen">
  <div class="top-bar">
    <app-screen-header title="Mis actividades" [fontSize]="18" />
    <button class="add-btn" (click)="navigateToRegistrar()" aria-label="Registrar actividades">
      <lucide-icon name="plus" [size]="18" />
    </button>
  </div>

  <div class="content">
    @if (isLoading()) {
      <div class="loading-state">
        <div class="skeleton skeleton--card"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>
    }

    @if (error()) {
      <div class="error-message">{{ error() }}</div>
    }

    @if (!isLoading()) {
      @if (sumatorio(); as s) {
        <app-section-header icon="sigma" title="Total acumulado" />
        <app-activity-grid [data]="s" />
      }

      @if (!error()) {
        <app-section-header icon="history" title="Historial" />

        @for (retiro of retiros(); track retiro.oracionId) {
          <app-list-item
            [title]="retiro.ubicacion"
            [subtitle]="getRetiroSubtitle(retiro)"
            (itemClick)="navigateToDetail(retiro.oracionId)"
          />
        } @empty {
          <div class="empty-state">
            <p>No hay actividades registradas</p>
          </div>
        }
      }
    }
  </div>
</div>
