<div class="screen">
  <div class="top-bar">
    <app-screen-header title="Mis actividades" [fontSize]="18" />
    <button class="add-btn" (click)="navigateToRegistrar()" aria-label="Registrar actividades">
      <lucide-icon name="plus" [size]="18" />
    </button>
  </div>

  <div class="content">
    @if (isLoading()) {
      <div class="loading-state">
        <div class="skeleton skeleton--card"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>
    }

    @if (error()) {
      <div class="error-message">{{ error() }}</div>
    }

    @if (!isLoading()) {
      <div class="summary-card">
        <div class="summary-card__stat">
          <span class="summary-card__value">{{ totalOraciones() }}</span>
          <span class="summary-card__label">Registros</span>
        </div>
        <div class="summary-card__divider"></div>
        <div class="summary-card__stat">
          <span class="summary-card__value">{{ totalMisas() }}</span>
          <span class="summary-card__label">Misas</span>
        </div>
        <div class="summary-card__divider"></div>
        <div class="summary-card__stat">
          <span class="summary-card__value">{{ totalAyunos() }}</span>
          <span class="summary-card__label">Ayunos</span>
        </div>
      </div>

      <app-section-header icon="history" title="Historial" />

      @for (oracion of oraciones(); track oracion.id) {
        <app-list-item
          [title]="getOracionTitle(oracion)"
          [subtitle]="getOracionSubtitle(oracion)"
        />
      } @empty {
        @if (!error()) {
          <div class="empty-state">
            <p>No hay actividades registradas</p>
          </div>
        }
      }
    }
  </div>
</div>
